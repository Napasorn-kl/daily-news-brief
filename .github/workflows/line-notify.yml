name: Send AI News to Line

on:
  push:
    paths:
      - 'news/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send news to LINE
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          LATEST_FILE=$(git diff --name-only HEAD~1 HEAD -- 'news/*.md' | grep -v send_line | head -1)
          if [ -z "$LATEST_FILE" ]; then
            LATEST_FILE=$(ls news/*.md | grep -v send_line | sort -r | head -1)
          fi
          echo "Using file: $LATEST_FILE"
          python3 news/send_line.py "$LATEST_FILE"
