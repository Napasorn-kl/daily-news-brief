name: Send AI News to Line

on:
  push:
    paths:
      - 'news/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get latest news content
        id: get_news
        run: |
          LATEST_FILE=$(ls -t news/*.md | head -1)
          CONTENT=$(cat "$LATEST_FILE" | head -n 20)
          echo "news_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to LINE
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          NEWS_CONTENT: ${{ steps.get_news.outputs.news_content }}
        run: |
          MESSAGE="📢 สรุปข่าว AI มาแล้วครับ!

          ${NEWS_CONTENT}

          อ่านเพิ่มเติมได้ที่ GitHub ของคุณครับ"

          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":$(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]}"
