name: Send AI News to Line

on:
  push:
    paths:
      - 'news/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get latest news content
        id: get_news
        run: |
          LATEST_FILE=$(ls -t news/*.md | head -1)
          CONTENT=$(cat "$LATEST_FILE" | head -n 20)
          echo "news_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Line Notify
        uses: appleboy/line-action@master
        with:
          to: ${{ secrets.LINE_USER_ID }}
          channel_access_token: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          message: |
            📢 สรุปข่าว AI มาแล้วครับ!

            ${{ steps.get_news.outputs.news_content }}

            อ่านเพิ่มเติมได้ที่ GitHub ของคุณครับ
